services:
  db:
    image: postgres:15-alpine
    container_name: spark_db_container
    restart: always
    environment:
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=spark_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: spark_redis
    restart: always
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:latest
    container_name: spark_redis_insight
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data
    environment:
      - RI_APP_REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  backend:
    build: ./spark-backend
    container_name: spark_backend_container
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://spark:pass@db:5432/spark_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3100/loki/api/v1/push"
        loki-batch-size: "400"

  frontend:
    build: ./spark-frontend
    container_name: spark_frontend_container
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
      - HOST=0.0.0.0
    depends_on:
      - backend
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3100/loki/api/v1/push"
        loki-batch-size: "400"

  loki:
    image: grafana/loki:2.9.0
    container_name: spark_loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: spark_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: spark_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: always
    
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: spark_cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always

volumes:
  postgres_data:
  loki_data:
  redis_insight_data:
  prometheus_data: